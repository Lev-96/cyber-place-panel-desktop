<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      Content Security Policy — defence-in-depth on top of Electron's
      contextIsolation+sandbox. Permissive enough for current features:
      - 'unsafe-inline' style — JSX uses inline `style={{…}}`
      - data:/blob: img — Vite bundles images, leaflet uses canvas blobs
      - https://*.tile.openstreetmap.org — leaflet OSM tiles
      - https + wss connect — Railway backend (HTTP) and the Reverb
        WebSocket service. Both hosts are pinned, no wildcards, so a
        compromised dependency can't exfiltrate to arbitrary domains.
        `frame-ancestors` is intentionally kept here as documentation
        even though browsers ignore it via <meta> — Electron's
        BrowserWindow blocks framing at the chrome layer anyway.
    -->
    <meta http-equiv="Content-Security-Policy" content="
      default-src 'self';
      script-src 'self';
      style-src 'self' 'unsafe-inline';
      font-src 'self' data:;
      img-src 'self' data: blob: https://*.tile.openstreetmap.org https://cyber-place-server-staging-production.up.railway.app;
      connect-src 'self' https://cyber-place-server-staging-production.up.railway.app wss://cyber-place-reverb.up.railway.app https://cyber-place-reverb.up.railway.app;
      base-uri 'self';
      form-action 'none';
      frame-ancestors 'none';
    " />
    <title>Cyberplace Panel</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
