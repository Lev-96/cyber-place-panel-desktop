name: Release Desktop (staging)

# Staging release track. Triggered by prerelease-style tags like
#   v1.0.40-staging.1
# Produces a build that points at the staging backend (Vite --mode staging)
# and publishes to the `staging` electron-updater channel (staging*.yml),
# marked as a GitHub *prerelease* so the production backend's
# /releases/latest never picks it up. See electron-builder.staging.json.

on:
  push:
    tags:
      - "v*-staging*"

permissions:
  contents: write

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: package.json version must equal the git tag (staging, -staging required)
        shell: bash
        run: |
          PKG_VERSION="$(node -p "require('./package.json').version")"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          echo "package.json=$PKG_VERSION  tag=$TAG_VERSION"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::package.json version ($PKG_VERSION) does not match tag ($TAG_VERSION). Bump package.json to match the tag before releasing."
            exit 1
          fi
          case "$PKG_VERSION" in
            *-staging*) : ;;
            *) echo "::error::Staging release must use a -staging version ($PKG_VERSION), e.g. 1.0.41-staging.1."; exit 1 ;;
          esac

  build-linux:
    needs: guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - name: Write .env.staging from repo variable
        env:
          ENV_STAGING: ${{ vars.ENV_STAGING }}
        shell: bash
        run: |
          if [ -z "$ENV_STAGING" ]; then echo "::error::Repo variable ENV_STAGING is not set — add it under Settings → Secrets and variables → Actions → Variables"; exit 1; fi
          printf '%s\n' "$ENV_STAGING" > .env.staging
      - run: npm run build:staging
      - name: Build Linux AppImage (staging channel, no auto-publish)
        run: npx electron-builder --linux --config electron-builder.staging.json --publish never
      - name: Upload selected Linux assets to release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: true
          fail_on_unmatched_files: true
          files: |
            release/*.AppImage
            release/staging-linux.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    needs: build-linux
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - name: Write .env.staging from repo variable
        env:
          ENV_STAGING: ${{ vars.ENV_STAGING }}
        shell: bash
        run: |
          if [ -z "$ENV_STAGING" ]; then echo "::error::Repo variable ENV_STAGING is not set — add it under Settings → Secrets and variables → Actions → Variables"; exit 1; fi
          printf '%s\n' "$ENV_STAGING" > .env.staging
      - run: npm run build:staging
      - name: Build Windows NSIS (staging channel, no auto-publish)
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        run: npx electron-builder --win --config electron-builder.staging.json --publish never
      # Same hard signing gate as production — staging .exe must also be
      # signed with the Cyber Place cert when signing is configured.
      - name: Verify Windows signatures
        if: env.CSC_LINK != ''
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
        shell: pwsh
        run: |
          $expected = 'Cyber Place'
          $files = Get-ChildItem -Path release -Recurse -Include *.exe -ErrorAction Stop
          if (-not $files) { throw "No .exe produced under release/" }
          $fail = $false
          foreach ($f in $files) {
            $sig = Get-AuthenticodeSignature -FilePath $f.FullName
            if (-not $sig.SignerCertificate) {
              Write-Error "UNSIGNED: $($f.FullName)"; $fail = $true; continue
            }
            if ($sig.SignerCertificate.Subject -notmatch [regex]::Escape($expected)) {
              Write-Error "WRONG SIGNER: $($f.FullName) -> $($sig.SignerCertificate.Subject)"; $fail = $true; continue
            }
            Write-Host "OK: $($f.Name)  signer=$($sig.SignerCertificate.Subject)  status=$($sig.Status)"
          }
          if ($fail) { throw "One or more .exe files were not signed correctly." }
      - name: Upload selected Windows assets to release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: true
          fail_on_unmatched_files: true
          files: |
            release/*.exe
            release/staging.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
